<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact QIFY</title>

<link rel="stylesheet" href="../style.css">

<style>

.contact-page{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
}

.contact-title{
  text-align:center;
  margin-bottom:10px;
}

.contact-desc{
  text-align:center;
  color:#475569;
  max-width:700px;
  margin:auto;
  line-height:1.7;
}

.contact-box{
  margin-top:50px;

  background:
  rgba(255,255,255,0.6);

  backdrop-filter:blur(12px);

  border-radius:24px;

  padding:35px;

  box-shadow:
  0 10px 30px rgba(0,0,0,0.06);
}

.contact-info{
  margin-bottom:35px;
}

.contact-info h2{
  margin-bottom:10px;
  color:#1e293b;
}

.contact-info p{
  color:#475569;
  line-height:1.8;
}

.contact-form{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.contact-form input,
.contact-form textarea{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  background:
  rgba(255,255,255,0.8);

  font-size:15px;
}

.contact-form textarea{
  min-height:140px;
  resize:vertical;
}

.contact-form button{
  width:100%;
}

.note{
  margin-top:25px;
  color:#64748b;
  font-size:14px;
  text-align:center;
}

</style>

</head>

<body>

<header>
  <div class="logo">QIFY</div>

  <div class="navigator-bar">
    <nav>
      <a href="../index.html">Home</a>
      <a href="about.html">About</a>
      <a href="topics.html">Topics</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="contact-page">

<h1 class="heading contact-title">
Contact QIFY
</h1>

<p class="contact-desc">
Need help, found a bug, or have suggestions for improving QIFY?
Feel free to contact us anytime.
</p>

<div class="contact-box">

<div class="contact-info">

<h2>Email Support</h2>

<p>
deepmistrycp@gmail.com
</p>

</div>

<form class="contact-form">

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Your Message"></textarea>

<button type="submit">
Send Message
</button>

</form>

<p class="note">
We usually respond within 24–48 hours.
</p>

</div>

</section>

<footer class="site-footer">

<p class="lastline">
© 2025 QIFY | Created by Deep Mistry
</p>

<div class="links">
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy-policy.html">Privacy</a> |
<a href="terms.html">Terms</a>
</div>

</footer>

</body>
</html>
